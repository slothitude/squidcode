# ── Squid Configuration for SquidCode ──
# SSL bump + ICAP RESPMOD integration

# Basic proxy port with SSL bump
http_port 3128 ssl-bump generate-host-certificates=on dynamic_cert_mem_cache_size=4MB

# SSL certificate for generating per-domain certs
sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/lib/ssl_db -M 4MB
acl step1 at_step SslBump1
acl step2 at_step SslBump2
acl step3 at_step SslBump3

# SSL bump steps: peek at SNI, then bump
ssl_bump peek step1
ssl_bump stare step2
ssl_bump bump step3

# ── ICAP Configuration ──
icap_enable on
icap_preview_enable off
icap_send_client_ip on
icap_send_client_username on

# ICAP service definition (RESPMOD)
icap_service squidcode respmod_precache icap://127.0.0.1:1344/squidcode routing=on

# Route all HTTP/HTTPS responses through ICAP
adaptation_access squidcode allow all

# ── Access Logs ──
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# ── Basic ACLs ──
acl localnet src 0.0.0.1-0.255.255.255
acl localnet src 10.0.0.0/8
acl localnet src 100.64.0.0/10
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow localnet
http_access allow localhost
http_access deny all

# ── Cache Settings ──
maximum_object_size 0
cache deny all
